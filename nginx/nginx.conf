# Configuration NGINX autonome pour une application Angular statique.
# Les chemins temporaires utilisent /tmp afin de rester compatibles avec une
# exécution future sans privilèges élevés.
worker_processes  1;
error_log  /var/log/nginx/error.log warn;
pid        /tmp/nginx.pid;

# Un worker suffit pour cette application de démonstration. Cette valeur peut
# être augmentée pour une charge de production plus importante.
events {
  worker_connections  1024;
}

http {
  # Répertoires temporaires explicitement accessibles dans l'image Alpine.
  client_body_temp_path /tmp/client_temp;
  proxy_temp_path       /tmp/proxy_temp_path;
  fastcgi_temp_path     /tmp/fastcgi_temp;
  uwsgi_temp_path       /tmp/uwsgi_temp;
  scgi_temp_path        /tmp/scgi_temp;
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
  access_log  /var/log/nginx/access.log  main;
  sendfile        on;
  keepalive_timeout  65;

  # Compression des principales ressources textuelles générées par Angular.
  gzip            on;
  gzip_static     on;
  gzip_vary       on;
  gzip_proxied    no-cache no-store private expired auth;
  gzip_min_length 10240;
  gzip_types
  application/javascript
  application/json
  font/woff2
  text/css
  text/plain;

  server {
    listen       80;
    server_name  localhost;

    # `try_files` sert d'abord une ressource réelle. Si aucune ressource ne
    # correspond, index.html est renvoyé afin que le routeur Angular traite
    # l'URL côté client.
    location / {
      root   /app;
      index  index.html;
      try_files $uri $uri/ /index.html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
      root   /usr/share/nginx/html;
    }
    # Le document HTML et un éventuel service worker ne doivent pas rester
    # durablement en cache, car ils référencent les bundles versionnés courants.
    location ~* (\.html|\/sw\.js)$ {
      root   /app;
      expires -1y;
      add_header Pragma "no-cache";
      add_header Cache-Control "public";
    }
    # Les bundles Angular possèdent un hash dans leur nom : ils peuvent être
    # conservés longtemps par le navigateur sans risque de servir une ancienne
    # version après un nouveau déploiement.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|json)$ {
      root   /app;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }
}
