name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: write

env:
  NODE_VERSION: "20.19"
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io
  TEST_RESULTS_DIR: test-results

jobs:
  test:
    name: Test application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [ -x "msm-projet-06-ops/run-tests.sh" ] || [ -f "msm-projet-06-ops/run-tests.sh" ]; then
            echo "project_type=multi" >> "$GITHUB_OUTPUT"
            echo "cache_dependency_path=**/package-lock.json" >> "$GITHUB_OUTPUT"
          elif [ -f "package.json" ]; then
            echo "project_type=npm" >> "$GITHUB_OUTPUT"
            echo "cache_dependency_path=package-lock.json" >> "$GITHUB_OUTPUT"
          elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
            echo "project_type=gradle" >> "$GITHUB_OUTPUT"
            echo "cache_dependency_path=**/*.gradle*" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported project: no package.json, build.gradle, or msm-projet-06-ops/run-tests.sh found" >&2
            exit 1
          fi

      - name: Show detected project type
        run: |
          echo "Detected project type: ${{ steps.detect.outputs.project_type }}"

      - name: Setup Node.js
        if: steps.detect.outputs.project_type == 'npm' || steps.detect.outputs.project_type == 'multi'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ steps.detect.outputs.cache_dependency_path }}

      - name: Setup Java
        if: steps.detect.outputs.project_type == 'gradle' || steps.detect.outputs.project_type == 'multi'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Install npm dependencies
        if: steps.detect.outputs.project_type == 'npm'
        run: npm ci --cache .npm --prefer-offline

      - name: Run npm tests
        if: steps.detect.outputs.project_type == 'npm'
        run: npm test

      - name: Collect npm JUnit reports
        if: always() && steps.detect.outputs.project_type == 'npm'
        shell: bash
        run: |
          mkdir -p "$TEST_RESULTS_DIR/npm"
          if [ -d reports ]; then
            find reports -type f -name '*.xml' -exec cp {} "$TEST_RESULTS_DIR/npm/" \;
          fi

      - name: Run Gradle tests
        if: steps.detect.outputs.project_type == 'gradle'
        shell: bash
        run: |
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            ./gradlew clean test --no-daemon
          else
            gradle clean test --no-daemon
          fi

      - name: Collect Gradle JUnit reports
        if: always() && steps.detect.outputs.project_type == 'gradle'
        shell: bash
        run: |
          mkdir -p "$TEST_RESULTS_DIR/gradle"
          if [ -d build/test-results/test ]; then
            find build/test-results/test -type f -name '*.xml' -exec cp {} "$TEST_RESULTS_DIR/gradle/" \;
          fi

      - name: Run multi-project tests
        if: steps.detect.outputs.project_type == 'multi'
        shell: bash
        run: |
          chmod +x msm-projet-06-ops/run-tests.sh
          ./msm-projet-06-ops/run-tests.sh

      - name: Collect multi-project JUnit reports
        if: always() && steps.detect.outputs.project_type == 'multi'
        shell: bash
        run: |
          mkdir -p "$TEST_RESULTS_DIR"
          if [ -d msm-projet-06-ops/test-results ]; then
            cp -R msm-projet-06-ops/test-results/. "$TEST_RESULTS_DIR/"
          fi

      - name: Upload JUnit reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: ${{ env.TEST_RESULTS_DIR }}/**/*.xml
          if-no-files-found: error

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Unit test report
          path: ${{ env.TEST_RESULTS_DIR }}/**/*.xml
          reporter: java-junit
          fail-on-error: true

  build:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Dockerfile
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f Dockerfile ]; then
            echo "Dockerfile not found at repository root" >&2
            exit 1
          fi

      - name: Compute image metadata
        id: image
        shell: bash
        run: |
          set -euo pipefail

          image_repository="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          branch="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+//; s/-+$//')"
          short_sha="${GITHUB_SHA::7}"

          echo "name=${REGISTRY}/${image_repository}" >> "$GITHUB_OUTPUT"
          echo "tag=${branch}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: "${{ steps.image.outputs.name }}:${{ steps.image.outputs.tag }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Release application
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install semantic-release
        run: |
          npm install --global \
            semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/changelog \
            @semantic-release/exec \
            @semantic-release/git \
            @semantic-release/github

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release

      - name: Read released version
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [ -f .release-version ]; then
            version="$(cat .release-version)"
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
            echo "Released version: ${version}"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "No semantic-release version was published."
          fi

      - name: Compute release image name
        if: steps.release.outputs.published == 'true'
        id: image
        shell: bash
        run: |
          image_repository="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "name=${REGISTRY}/${image_repository}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.release.outputs.published == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: steps.release.outputs.published == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release Docker image
        if: steps.release.outputs.published == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: "${{ steps.image.outputs.name }}:${{ steps.release.outputs.version }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max
