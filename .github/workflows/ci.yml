name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: write

env:
  NODE_VERSION: "20.19"
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io
  TEST_RESULTS_DIR: test-results

jobs:
  test:
    uses: msm-oc-projects/msm-projet-06-ops/.github/workflows/ci.yml@main

  build:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Dockerfile
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f Dockerfile ]; then
            echo "Dockerfile not found at repository root" >&2
            exit 1
          fi

      - name: Compute image metadata
        id: image
        shell: bash
        run: |
          set -euo pipefail

          image_repository="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          branch="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+//; s/-+$//')"
          short_sha="${GITHUB_SHA::7}"

          echo "name=${REGISTRY}/${image_repository}" >> "$GITHUB_OUTPUT"
          echo "tag=${branch}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: "${{ steps.image.outputs.name }}:${{ steps.image.outputs.tag }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Release application
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://npm.pkg.github.com
          scope: "@msm-oc-projects"

      - name: Install semantic-release
        run: |
          npm install --global \
            semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/changelog \
            @semantic-release/exec \
            @semantic-release/git \
            @semantic-release/github

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release

      - name: Read released version
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [ -f .release-version ]; then
            version="$(cat .release-version)"
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
            echo "Released version: ${version}"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "No semantic-release version was published."
          fi

      - name: Install dependencies for package publication
        if: steps.release.outputs.published == 'true'
        run: npm ci --cache .npm --prefer-offline

      - name: Publish npm package to GitHub Packages
        if: steps.release.outputs.published == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish

      - name: Compute release image name
        if: steps.release.outputs.published == 'true'
        id: image
        shell: bash
        run: |
          image_repository="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "name=${REGISTRY}/${image_repository}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.release.outputs.published == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: steps.release.outputs.published == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release Docker image
        if: steps.release.outputs.published == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: "${{ steps.image.outputs.name }}:${{ steps.release.outputs.version }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max
